<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">


<style>
  :root{
    --bg:#0b1210;
    --panel:#101c18;
    --panel-raised:#132420;
    --ink:#e8f0ec;
    --ink-dim:#9db3ab;
    --muted:#5f746c;
    --border:#20342c;
    --accent:#4dffb4;
    --accent-dim:#2a6b52;
    --amber:#ffb454;
    --red:#ff6b5e;
    --font-display: 'Space Grotesk', system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  body {
    width: 420px;
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 16px;
    box-sizing: border-box;
  }
  .header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
    margin-bottom: 16px;
  }
  h1 {
    font-family: var(--font-display);
    font-size: 24px;
    margin: 0 0 4px;
    font-weight: 700;
  }
  h1 span { color: var(--accent); }
  .sub {
    color: var(--ink-dim);
    font-size: 12px;
    margin: 0;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 16px;
  }
  button.primary {
    width: 100%;
    background: var(--accent);
    color: #06120d;
    border: none;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14px;
    padding: 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  button.primary:hover { box-shadow: 0 0 15px rgba(77,255,180,0.35); }
  button.primary:disabled { background: var(--muted); cursor: not-allowed; }
  
  /* Results styling */
  #results { display: none; }
  .verdict-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .gauge-wrap { position: relative; width: 100px; height: 60px; }
  .gauge-score {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    text-align: center;
    font-size: 20px;
    font-weight: 700;
  }
  .verdict-text .tag {
    font-size: 10px;
    text-transform: uppercase;
    border: 1px solid currentColor;
    padding: 2px 6px;
    border-radius: 3px;
    display: inline-block;
    margin-bottom: 4px;
  }
  .verdict-text h2 { font-size: 16px; margin: 0 0 4px; }
  .verdict-text p { font-size: 11px; color: var(--ink-dim); margin: 0; }
  
  .signal {
    display: grid;
    grid-template-columns: 20px 1fr auto;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .signal:last-child { border-bottom: none; }
  .ok { color: var(--accent); }
  .warn { color: var(--amber); }
  .bad { color: var(--red); }

  /* Scrape Preview Terminal */
  .preview-box {
    margin-top: 16px;
    background: #06120d;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
    max-height: 120px;
    overflow-y: auto;
  }
  .preview-title {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
    font-weight: bold;
  }
  .preview-item {
    font-size: 11px;
    color: var(--ink-dim);
    border-bottom: 1px dashed var(--border);
    padding: 4px 0;
  }
  .preview-item:last-child { border-bottom: none; }
</style>
</head>
<body>
  <div class="header">
    <h1>Scan<span>line</span></h1>
    <p class="sub"> JQuery-Powered Database Parser</p>
  </div>

  <div class="panel">
    <button class="primary" id="scanBtn">Scan This Page's Reviews</button>
  </div>

  <div class="panel" id="results">
    <div class="verdict-row">
      <div class="gauge-wrap">
        <svg viewBox="0 0 100 60" width="100" height="60">
          <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#1a2b24" stroke-width="8" stroke-linecap="round"/>
          <path id="gaugeArc" d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#4dffb4" stroke-width="8" stroke-linecap="round"
                stroke-dasharray="125" stroke-dashoffset="125"/>
        </svg>
        <div class="gauge-score" id="gaugeScore">0</div>
      </div>
      <div class="verdict-text">
        <div class="tag" id="verdictTag">—</div>
        <h2 id="verdictHeadline">—</h2>
        <p id="verdictSub">—</p>
      </div>
    </div>
    <div id="signals"></div>
    
    <div class="preview-title" style="margin-top: 16px;">Verified Scraped Reviews:</div>
    <div class="preview-box" id="previewBox">
      <div class="preview-item">No reviews scanned yet.</div>
    </div>
  </div>
  <script src="jquery.min.js"></script>

  <script src="popup.js"></script>
</body>
</html>
